<head>

  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Generalno"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>Generalno Čišćenje Stana</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow-x:hidden}
    body{font-family:'Nunito','Trebuchet MS',sans-serif;background:#F2F7F4;color:#1C1C1E;-webkit-tap-highlight-color:transparent}

    #header{
      position:sticky;top:0;z-index:100;
      background:#1C1C1E;padding:18px 16px 14px;
      border-radius:0 0 24px 24px;
      box-shadow:0 6px 24px rgba(0,0,0,0.3);
      text-align:center;
    }
    #header h1{font-size:19px;font-weight:900;color:#fff;letter-spacing:0.5px;margin:4px 0 2px}
    #header-sub{font-size:12px;color:#888;margin-bottom:8px}
    #total-badge{
      display:inline-flex;align-items:center;gap:6px;
      background:rgba(255,255,255,0.1);border-radius:20px;
      padding:3px 14px;font-size:13px;font-weight:800;color:#fff;
    }

    /* Room tabs */
    #room-tabs{
      display:flex;gap:8px;padding:14px 12px;
      overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;
      flex-wrap:nowrap;
    }
    #room-tabs::-webkit-scrollbar{display:none}
    .room-btn{
      flex:0 0 auto;border:2.5px solid var(--c);border-radius:14px;
      background:#fff;color:var(--c);
      padding:8px 12px;font-family:'Nunito',sans-serif;
      font-size:12px;font-weight:700;cursor:pointer;
      text-align:center;min-width:70px;transition:all 0.15s;
      line-height:1.5;
    }
    .room-btn.active{background:var(--c);color:#fff;box-shadow:0 4px 14px color-mix(in srgb,var(--c) 50%,transparent)}
    .room-btn .room-pct{font-size:10px;font-weight:600;opacity:0.8}

    /* Progress */
    #progress-wrap{max-width:480px;margin:0 auto 12px;padding:0 14px}
    #progress-box{
      background:#fff;border-radius:16px;padding:12px 14px;
      box-shadow:0 2px 12px rgba(0,0,0,0.07);
      display:flex;align-items:center;gap:10px;
    }
    #progress-inner{flex:1}
    #progress-label{font-size:11px;color:#999;margin-bottom:5px}
    #progress-bar-bg{height:9px;background:#EEE;border-radius:5px;overflow:hidden}
    #progress-bar{height:100%;width:0%;border-radius:5px;transition:width 0.4s cubic-bezier(.4,2,.6,1)}
    #progress-pct{font-size:18px;font-weight:900;min-width:40px;text-align:right}
    #reset-btn{background:none;border:1.5px solid #EEE;border-radius:8px;padding:4px 8px;font-size:10px;color:#BBB;cursor:pointer;font-family:'Nunito',sans-serif}
    #congrats{text-align:center;padding:6px 0 0;font-size:14px;font-weight:800;display:none}

    /* Tasks */
    #tasks-wrap{max-width:480px;margin:0 auto;padding:0 14px 100px}
    .section-title{font-size:12px;font-weight:800;letter-spacing:0.5px;margin:16px 0 7px;text-transform:uppercase}
    .task-item{
      display:flex;align-items:center;gap:10px;
      background:#fff;border:2px solid #EEE;border-radius:14px;
      padding:11px 12px;margin-bottom:6px;cursor:pointer;
      transition:all 0.15s;user-select:none;-webkit-user-select:none;
    }
    .task-item:active{transform:scale(0.97)}
    .task-checkbox{
      width:26px;height:26px;border-radius:8px;border:2.5px solid #DDD;
      background:#fff;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;font-size:14px;color:#fff;font-weight:900;transition:all 0.15s;
    }
    .task-emoji{font-size:19px;flex-shrink:0}
    .task-name{font-size:14px;font-weight:700;color:#1C1C1E;line-height:1.3;flex:1;transition:all 0.15s}
    .task-item.checked .task-name{color:#BBB;text-decoration:line-through}
    .task-done-icon{font-size:15px;opacity:0;transition:opacity 0.15s}
    .task-item.checked .task-done-icon{opacity:1}

    /* Overall progress bar at bottom */
    #bottom-bar{
      position:fixed;bottom:0;left:0;right:0;
      background:#1C1C1E;padding:10px 16px;
      display:flex;align-items:center;gap:10px;
      box-shadow:0 -4px 20px rgba(0,0,0,0.2);
    }
    #bottom-label{font-size:11px;color:#888;white-space:nowrap}
    #bottom-bar-bg{flex:1;height:8px;background:#333;border-radius:4px;overflow:hidden}
    #bottom-bar-fill{height:100%;background:#2D7D46;border-radius:4px;transition:width 0.4s ease}
    #bottom-pct{font-size:13px;font-weight:800;color:#fff;min-width:36px;text-align:right}

    @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}
  </style>
</head>

  <div id="congrats"></div>

const STORAGE_KEY = "generalno_v1";
let state = {checked:{}};
try{const s=localStorage.getItem(STORAGE_KEY);if(s)state=JSON.parse(s);}catch{}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch{}}

let activeRoom = 0;

function allTasksForRoom(ri){return ROOMS[ri].sections.flatMap(s=>s.tasks);}
function doneForRoom(ri){return allTasksForRoom(ri).filter(t=>state.checked[`r${ri}_${t.id}`]).length;}
function totalAll(){return ROOMS.reduce((a,_,i)=>a+allTasksForRoom(i).length,0);}
function doneAll(){return ROOMS.reduce((a,_,i)=>a+doneForRoom(i),0);}

function color(){return ROOMS[activeRoom].color;}

function renderHeader(){
  const da=doneAll(), ta=totalAll();
  document.getElementById("total-done").textContent=da;
  document.getElementById("total-all").textContent=ta;
  const pct=ta?Math.round(da/ta*100):0;
  document.getElementById("bottom-bar-fill").style.width=pct+"%";
  document.getElementById("bottom-pct").textContent=pct+"%";
}

function renderTabs(){
  const wrap=document.getElementById("room-tabs");
  wrap.innerHTML="";
  ROOMS.forEach((r,i)=>{
    const tasks=allTasksForRoom(i);
    const done=doneForRoom(i);
    const total=tasks.length;
    const complete=done===total&&total>0;
    const btn=document.createElement("button");
    btn.className="room-btn"+(i===activeRoom?" active":"");
    btn.style.setProperty("--c",r.color);
    if(i===activeRoom){btn.style.background=r.color;btn.style.color="#fff";}
    btn.innerHTML=`${r.emoji}<br><span style="font-size:11px">${r.name.split(" ")[0]}</span><br><span class="room-pct">${complete?"✓":done+"/"+total}</span>`;
    btn.onclick=()=>{activeRoom=i;render();};
    wrap.appendChild(btn);
  });
}

function renderProgress(){
  const r=ROOMS[activeRoom];
  const tasks=allTasksForRoom(activeRoom);
  const total=tasks.length;
  const done=doneForRoom(activeRoom);
  const pct=total?Math.round(done/total*100):0;
  document.getElementById("progress-label").textContent=`${r.emoji} ${r.name} — Završeno ${done} od ${total}`;
  const bar=document.getElementById("progress-bar");
  bar.style.width=pct+"%";
  bar.style.background=color();
  document.getElementById("progress-pct").textContent=pct+"%";
  document.getElementById("progress-pct").style.color=color();
  const cong=document.getElementById("congrats");
  if(done===total&&total>0){
    cong.style.display="block";
    cong.style.color=color();
    cong.textContent=`🎉 ${r.name} je potpuno čista!`;
  }else{cong.style.display="none";}
}

function renderTasks(){
  const wrap=document.getElementById("tasks-wrap");
  wrap.innerHTML="";
  const r=ROOMS[activeRoom];
  r.sections.forEach(sec=>{
    const title=document.createElement("div");
    title.className="section-title";
    title.style.color=color();
    title.textContent=sec.sec;
    wrap.appendChild(title);
    sec.tasks.forEach(task=>{
      const key=`r${activeRoom}_${task.id}`;
      const isChecked=!!state.checked[key];
      const item=document.createElement("div");
      item.className="task-item"+(isChecked?" checked":"");
      if(isChecked){item.style.borderColor=color()+"55";item.style.background=color()+"10";}
      const cb=document.createElement("div");
      cb.className="task-checkbox";
      if(isChecked){cb.style.background=color();cb.style.borderColor=color();cb.textContent="✓";}
      const em=document.createElement("div");em.className="task-emoji";em.textContent=task.e;
      const nm=document.createElement("div");nm.className="task-name";nm.textContent=task.n;
      const ck=document.createElement("div");ck.className="task-done-icon";ck.textContent="✅";
      item.appendChild(cb);item.appendChild(em);item.appendChild(nm);item.appendChild(ck);
      item.onclick=()=>{
        state.checked[key]=!state.checked[key];
        save();render();
      };
      wrap.appendChild(item);
    });
  });
}

function resetRoom(){
  Object.keys(state.checked).filter(k=>k.startsWith(`r${activeRoom}_`)).forEach(k=>delete state.checked[k]);
  save();render();
}

function render(){renderHeader();renderTabs();renderProgress();renderTasks();}

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
render();
</script>
